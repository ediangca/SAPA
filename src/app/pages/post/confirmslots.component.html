<div
  class="bg-[url('https://shs-components.infopark.io/siemens-healthcare/countries/us/services/cs-workforce-honeycomb/assets/workforce-people-illustration.png')] 
  bg-cover bg-top bg-no-repeat bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-white/30 dark:bg-white/30"></div>

  <div
    class="bg-white shadow-lg z-10 rounded-2xl p-8 max-w-md text-center animate-fadeIn bg-gradient-to-br from-green-50 to-green-100">

    <!-- Icon -->
    <div class="flex justify-center mb-6">
      <div
        class="w-20 h-20 flex items-center justify-center rounded-full"
        [ngClass]="iconBgClass">

        <i
          class="pi text-4xl"
          [ngClass]="iconClass"></i>

      </div>
    </div>

    <!-- Title -->
    <h2 class="text-2xl font-bold mb-4" [ngClass]="titleClass">
      {{ title }}
    </h2>

    <!-- Message -->
    <p class="mb-6" [ngClass]="messageClass">
      {{ statusMessage }}
    </p>

    <!-- Action -->
    <a
      *ngIf="showButton"
      routerLink="/dashboard/post/schedules"
      class="inline-block px-6 py-3 bg-green-600 text-white font-medium rounded-xl shadow hover:bg-green-700 transition">
      Go to Schedules
    </a>

  </div>
</div>
