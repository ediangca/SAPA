<app-floating-configurator />
<p-toast></p-toast>
<div

bg-cover bg-top bg-no-repeat bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <!-- Overlay -->
    <div class="absolute inset-0 bg-white/30 dark:bg-white/30"></div>

    <div
        class="bg-white shadow-lg z-10 rounded-2xl p-8 max-w-md text-center animate-fadeIn bg-gradient-to-br from-green-50 to-green-100">

        <!-- Icon -->
        <div class="flex flex-col justify-between mb-4">
            <!-- <div class="w-20 h-20 flex items-center justify-center rounded-full bg-green-100 animate-bounce">
                <span class="p-button-icon pi pi-key ng-star-inserted font-bold" data-pc-section="icon"></span>
            </div> -->
            <!-- Title -->

            <div class="flex justify-center my-5">
                <div
                    class="w-20 h-20 flex items-center justify-center rounded-full bg-red-100 animate-bounce">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        width="800px" height="800px" viewBox="0 0 52 52"
                        class="h-10 w-10 text-red-600"
                        fill="currentColor"
                        enable-background="new 0 0 52 52" xml:space="preserve">
                        <g>
                            <path
                                d="M42,23H10c-2.2,0-4,1.8-4,4v19c0,2.2,1.8,4,4,4h32c2.2,0,4-1.8,4-4V27C46,24.8,44.2,23,42,23z M31,44.5
		c-1.5,1-3.2,1.5-5,1.5c-0.6,0-1.2-0.1-1.8-0.2c-2.4-0.5-4.4-1.8-5.7-3.8l3.3-2.2c0.7,1.1,1.9,1.9,3.2,2.1c1.3,0.3,2.6,0,3.8-0.8
		c2.3-1.5,2.9-4.7,1.4-6.9c-0.7-1.1-1.9-1.9-3.2-2.1c-1.3-0.3-2.6,0-3.8,0.8c-0.3,0.2-0.5,0.4-0.7,0.6L26,37h-9v-9l2.6,2.6
		c0.4-0.4,0.9-0.8,1.3-1.1c2-1.3,4.4-1.8,6.8-1.4c2.4,0.5,4.4,1.8,5.7,3.8C36.2,36.1,35.1,41.7,31,44.5z" />
                            <path
                                d="M10,18.1v0.4C10,18.4,10,18.3,10,18.1C10,18.1,10,18.1,10,18.1z" />
                            <path
                                d="M11,19h4c0.6,0,1-0.3,1-0.9V18c0-5.7,4.9-10.4,10.7-10C32,8.4,36,13,36,18.4v-0.3c0,0.6,0.4,0.9,1,0.9h4
		c0.6,0,1-0.3,1-0.9V18c0-9.1-7.6-16.4-16.8-16c-8.5,0.4-15,7.6-15.2,16.1C10.1,18.6,10.5,19,11,19z" />
                        </g>
                    </svg>
                </div>
            </div>

            <h2 class="text-2xl font-semibold text-gray-800 mb-2">
                Reset Your Password
            </h2>
        </div>

        <!-- Description -->
        <p class="text-lg text-gray-600 mb-6">
            Enter a new password for your account. <br>
            For security purposes, this link will expire shortly.
        </p>

        <!-- Password Rules -->
        <p class="text-md text-gray-500 mb-3 text-left">
            Password must be at least 8 characters long.
        </p>

        <!-- New Password -->
        <p-password id="password" placeholder="New Password" name="password"
            [toggleMask]="true"
            styleClass="mb-4" [fluid]="true" [feedback]="true"
            [(ngModel)]="password"></p-password>

        <!-- Confirm Password -->
        <p-password id="confirm-password" placeholder="Confirm Password"
            name="password" [toggleMask]="true"
            styleClass="mb-4" [fluid]="true" [feedback]="true"
            [(ngModel)]="confirmPassword"></p-password>

        <!-- Submit -->
        <button pButton label="Reset Password" severity="primary"
            class="w-full "
            [loading]="loading" [disabled]="loading"
            (click)="submit()">
        </button>

        <div class="text-gray-600 my-6 leading-relaxed">
            <!-- Optional Footer -->
            <p class="text-md text-gray-400">
                If you did not request this, you may safely close this page.
            </p>
        </div>

        <!-- Redirect Button -->
        <a routerLink="/"
            class="inline-block px-6 py-3 bg-primary-600 text-white font-medium rounded-xl shadow hover:bg-primary-700 transition duration-300 ease-in-out">
            <i class="pi pi-home pr-2"></i> Home
        </a>
    </div>

        <h2 class="text-xl font-semibold mb-4">Reset Password</h2>

        <input pInputText type="password" class="w-full mb-3" placeholder="New Password" [(ngModel)]="password" />

        <input pInputText type="password" class="w-full mb-3" placeholder="Confirm Password"
            [(ngModel)]="confirmPassword" />

        <button pButton label="Reset Password" class="w-full" [loading]="loading" [disabled]="loading"
            (click)="submit()">
        </button>
    </div> -->

</div>
