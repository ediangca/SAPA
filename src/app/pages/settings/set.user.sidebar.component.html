    <p-panelmenu [model]="subcomponent"></p-panelmenu>

<p-dialog [(visible)]="assignDialog" header="Print Dialog" [modal]="true" [style]="{width: '70vw',}" [closable]="true"
    [resizable]="true" [draggable]="true" [contentStyle]="{'height':'calc(100% - 60px)', 'overflow':'auto'}">

    <ng-template #content>
        <div class="flex flex-col lg:flex-row gap-6 h-full h-full divide-y lg:divide-y-0 lg:divide-x divide-gray-300">


        </div>
    </ng-template>

    <!-- Footer -->
    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-3 w-full">
            <p-button label="Cancel" icon="pi pi-times" text (click)="hideDialog()" />
            <p-button label="Print" icon="pi pi-check" (click)="save()" />
        </div>
    </ng-template>
</p-dialog>


<p-confirmDialog [style]="{ width: '450px' }" acceptIcon="pi pi-check text-white" rejectIcon="pi pi-times text-white"
    acceptButtonStyleClass="bg-green-600 hover:bg-green-700 text-white font-medium px-4 py-2 rounded-lg transition "
    rejectButtonStyleClass="bg-red-600 hover:bg-red-700 text-white font-medium px-4 py-2 rounded-lg transition">
</p-confirmDialog>
