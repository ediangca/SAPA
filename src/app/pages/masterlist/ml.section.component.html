<div class="flex flex-col md:flex-row gap-8">
    <!-- SECTION TABLE -->
    <div class="md:w-5/6">
        <div class="card">
            <p-table #dt [value]="sections()" [rows]="10" [columns]="cols" [paginator]="true"
                [globalFilterFields]="['sectionID', 'sectionName']"
                [tableStyle]="{ 'min-width': '60rem', 'table-layout': 'fixed' }" [(selection)]="selectSections"
                [rowHover]="true" dataKey="sectionID"
                currentPageReportTemplate="Showing {first} to {last} of {totalRecords} sections"
                [showCurrentPageReport]="true" [rowsPerPageOptions]="[10, 20, 30]" scrollable="true"
                scrollHeight="flex">

                <ng-template pTemplate="caption">

                    <p-button class="float-left " icon="pi pi-arrow-left" severity="primary"
                        routerLink="/dashboard/masterlist/hospitals" text raised rounded />

                    <div class="flex row justify-center">

                        <h5 class="m-0">Manage Sections</h5>
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex row">
                            <p-button label="New" icon="pi pi-plus" severity="secondary" class="mr-2"
                                (onClick)="openNew()" />
                            <p-button severity="secondary" label="Delete" icon="pi pi-trash" outlined
                                (onClick)="deleteSelected()" [disabled]="!selectSections || !selectSections.length" />
                        </div>
                        <p-iconfield>
                            <p-inputicon styleClass="pi pi-search" />
                            <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" class="mr-2"
                                placeholder="Search..." />
                            <button pButton label="Clear" class="p-button-outlined mr-2" icon="pi pi-filter-slash"
                                (click)="clear(dt)"></button>
                            
                            <p-button label="Export" icon="pi pi-upload" severity="info" (onClick)="exportCSV()" />
                        </p-iconfield>

                    </div>
                </ng-template>
                
                <ng-template #header>
                    <tr>
                        <th style="width: 3rem">
                            <p-tableHeaderCheckbox />
                        </th>
                        <th style="min-width: 3rem">Section ID</th>
                        <th pSortableColumn="sectionName" style="min-width:10rem">
                            Name
                            <p-sortIcon field="name" />
                        </th>
                        <th style="min-width: 5rem">Action</th>
                    </tr>
                </ng-template>
                <ng-template #body let-section>
                    <tr>
                        <td style="width: 3rem">
                            <p-tableCheckbox [value]="section" />
                        </td>
                        <td style="min-width: 3rem">{{ section.sectionID }}</td>
                        <td style="min-width: 10rem">{{ section.sectionName }}</td>
                        <td>
                            <div class="flex flex-row gap-2">
                                <p-button icon="pi pi-pencil" [rounded]="true" [outlined]="true"
                                    (click)="edit(section)" />
                                <p-button icon="pi pi-trash" severity="danger" [rounded]="true"
                                    [outlined]="true" (click)="delete(section)" />
                            </div>
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
    <!-- SUBMENU -->
    <div class="md:w-1/6">
        <ml-hospital-properties></ml-hospital-properties>
    </div>

</div>

<p-dialog [(visible)]="itemDialog" [style]="{ width: '450px' }" header="Section Details" [modal]="true">
    <ng-template #content>
        <div class="flex flex-col gap-6">
            <form [formGroup]="form" ng-reflect-form="[object Object]">
                <div>
                    <label for="sectionName" class="block font-bold mb-3">Section Name</label>
                    <input type="text" pInputText id="sectionName" name="sectionName" formControlName="sectionName"
                        required autofocus fluid />
                    <small class="text-red-500" *ngIf="submitted && !form.value['sectionName']"> Name is
                        required.</small>
                </div>
                <div>
                    <input type="text" pInputText id="userID" name="userID" formControlName="userID" hidden />
                </div>

            </form>
        </div>
    </ng-template>

    <ng-template #footer>
        <p-button label="Cancel" icon="pi pi-times" text (click)="hideDialog()" />
        <p-button label="Save" icon="pi pi-check" (click)="save()" />
    </ng-template>
</p-dialog>

<p-confirmdialog [style]="{ width: '450px' }" />
