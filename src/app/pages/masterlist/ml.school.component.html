<div class="flex flex-col md:flex-row gap-8">

    <div class="card">
        <p-table #dt [value]="schools()" [rows]="10" [columns]="cols" [paginator]="true"
            [globalFilterFields]="['sectionID', 'sectionName']"
            [tableStyle]="{ 'min-width': '60rem', 'table-layout': 'fixed' }" [(selection)]="selectSchools"
            [rowHover]="true" dataKey="sectionID"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} sections"
            [showCurrentPageReport]="true" [rowsPerPageOptions]="[10, 20, 30]" scrollable="true" scrollHeight="flex">

            <ng-template pTemplate="caption">

                <p-button class="float-left " icon="pi pi-arrow-left" severity="secondary"
                    routerLink="/dashboard/masterlist/hospitals" text raised rounded />

                <div class="flex row justify-center">

                    <h5 class="m-0">Manage Schools</h5>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex row">
                        <p-button label="New" icon="pi pi-plus" severity="secondary" class="mr-2"
                            (onClick)="openNew()" />
                        <!-- <p-button severity="secondary" label="Delete" icon="pi pi-trash" outlined
                            (onClick)="deleteSelected()" [disabled]="!selectSchools || !selectSchools.length" /> -->
                    </div>
                    <p-iconfield>
                        <p-inputicon styleClass="pi pi-search" />
                        <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" class="mr-2"
                            placeholder="Search..." />
                        <button pButton label="Clear" class="p-button-outlined mr-2" icon="pi pi-filter-slash"
                            (click)="clear(dt)"></button>
                        <button pButton label="Export" class="p-button-outlined" icon="pi pi-upload" severity="info"
                            (onClick)="exportCSV()"></button>
                    </p-iconfield>

                </div>
            </ng-template>
            <ng-template #header>
                <tr>
                    <!-- <th style="width: 3rem">
                        <p-tableHeaderCheckbox />
                    </th> -->
                    <th pSortableColumn="schoolID" style="max-width: 1rem">School ID
                        <p-sortIcon field="schoolID" />
                    </th>
                    <th pSortableColumn="schoolName" style="min-width:3rem">
                        School 3rem
                        <p-sortIcon field="schoolName" />
                    </th>
                    <th pSortableColumn="address" style="min-width:10rem">
                        Address
                        <p-sortIcon field="address" />
                    </th>
                    <th pSortableColumn="address" style="min-width:3rem">
                        Coordinator
                        <p-sortIcon field="coordinator" />
                    </th>
                    <th style="min-width: 5rem">Action</th>
                </tr>
            </ng-template>
            <ng-template #body let-school>
                <tr>
                    <!-- <td style="width: 3rem">
                        <p-tableCheckbox [value]="section" />
                    </td> -->
                    <td style="max-width: 1rem">{{ school.schoolID }}</td>
                    <td style="min-width: 3rem">{{ school.schoolName }}</td>
                    <td style="min-width: 10rem">{{ school.address }}</td>
                    <td style="min-width: 3rem">{{ 'to be created' }}</td>
                    <td>
                        <div class="flex flex-row gap-2">
                            <p-button icon="pi pi-pencil" [rounded]="true" [outlined]="true" (click)="edit(school)" />
                            <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true"
                                (click)="delete(school)" />
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

</div>

<p-dialog [(visible)]="itemDialog" [style]="{ width: '450px' }" header="School Details" [modal]="true">
    <ng-template #content>
        <div class="flex flex-col gap-6">
            <form [formGroup]="form" ng-reflect-form="[object Object]">
                <div>
                    <label for="schoolName" class="block font-bold mb-3">School Name</label>
                    <input type="text" pInputText id="schoolName" name="schoolName" formControlName="schoolName"
                        required autofocus fluid />
                    <label for="address" class="block font-bold mb-3">School Address</label>
                    <textarea id="address" pTextarea name="address" formControlName="address" required rows="3"
                        cols="20" fluid></textarea>
                    <small class="text-red-500" *ngIf="submitted && !form.value['schoolName']"> Name is
                        required.</small>
                </div>
                <div>
                    <input type="text" pInputText id="userID" name="userID" formControlName="userID" hidden />
                </div>

            </form>
        </div>
    </ng-template>

    <ng-template #footer>
        <p-button label="Cancel" icon="pi pi-times" text (click)="hideDialog()" />
        <p-button label="Save" icon="pi pi-check" (click)="save()" />
    </ng-template>
</p-dialog>

<p-confirmdialog [style]="{ width: '450px' }" />
